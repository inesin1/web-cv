<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Artyom Nesin — Backend-focused Fullstack</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ec;
    --bg-2: #ebe6df;
    --ink: #161412;
    --ink-2: #4a4642;
    --ink-3: #8a847d;
    --line: rgba(22,20,18,.13);
    --line-strong: rgba(22,20,18,.28);
    --accent: #161412;
    --paper-grain: rgba(22,20,18,.025);
    --serif: 'Instrument Serif', 'Times New Roman', serif;
    --sans: 'Geist', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  [data-theme="dark"] {
    --bg: #14110e;
    --bg-2: #1d1915;
    --ink: #f1ece4;
    --ink-2: #b8b1a6;
    --ink-3: #7a746a;
    --line: rgba(241,236,228,.12);
    --line-strong: rgba(241,236,228,.28);
    --accent: #f1ece4;
    --paper-grain: rgba(241,236,228,.018);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-feature-settings: "ss01","cv11"; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body {
    background-image:
      radial-gradient(circle at 1px 1px, var(--paper-grain) 1px, transparent 0);
    background-size: 3px 3px;
    cursor: none;
    overflow-x: hidden;
    transition: background-color .35s ease, color .35s ease;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--ink); color: var(--bg); }

  /* Custom cursor */
  .cursor-dot, .cursor-ring {
    position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
    will-change: transform; mix-blend-mode: difference;
  }
  .cursor-dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }
  .cursor-ring {
    width: 36px; height: 36px; border: 1px solid #fff; border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width .25s cubic-bezier(.2,.7,.3,1), height .25s cubic-bezier(.2,.7,.3,1), border-radius .25s, background .25s;
  }
  .cursor-ring.is-link { width: 64px; height: 64px; background: rgba(255,255,255,.15); }
  .cursor-ring.is-text { width: 4px; height: 28px; border-radius: 1px; }

  /* Top bar */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 40px;
    backdrop-filter: blur(12px) saturate(1.2);
    background: color-mix(in srgb, var(--bg) 70%, transparent);
    border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 12px; font-family: var(--mono); font-size: 12px; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-2); }
  .brand .dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; box-shadow: 0 0 0 4px color-mix(in srgb, #4caf50 25%, transparent); animation: pulse 2.2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 4px color-mix(in srgb, #4caf50 25%, transparent); } 50% { box-shadow: 0 0 0 8px color-mix(in srgb, #4caf50 0%, transparent); } }
  .controls { display: flex; gap: 4px; align-items: center; font-family: var(--mono); font-size: 11px; letter-spacing: .04em; }
  .seg { display: flex; border: 1px solid var(--line-strong); border-radius: 999px; overflow: hidden; }
  .seg button { background: transparent; border: 0; padding: 7px 13px; font: inherit; color: var(--ink-3); cursor: none; transition: all .2s; text-transform: uppercase; }
  .seg button.on { background: var(--ink); color: var(--bg); }
  .seg button:hover:not(.on) { color: var(--ink); }
  .ctrl-divider { width: 1px; height: 18px; background: var(--line-strong); margin: 0 12px; }

  /* Hero */
  .hero { padding: 160px 60px 80px; position: relative; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
  .hero-meta { display: flex; gap: 28px; font-family: var(--mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 48px; }
  .hero-meta span:not(:last-child)::after { content: "·"; margin-left: 28px; opacity: .5; }
  .hero h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(80px, 14vw, 220px);
    line-height: .88;
    letter-spacing: -0.04em;
    margin-bottom: 32px;
    word-spacing: -0.05em;
  }
  .hero h1 .italic { font-style: italic; color: var(--ink-2); }
  .hero-sub {
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; max-width: 1100px; margin-top: 60px;
  }
  .hero-tag { font-family: var(--serif); font-style: italic; font-size: 32px; line-height: 1.25; color: var(--ink); max-width: 540px; }
  .hero-intro { font-size: 17px; line-height: 1.55; color: var(--ink-2); max-width: 480px; }
  .hero-foot { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 100px; padding-top: 28px; border-top: 1px solid var(--line); }
  .hero-stack { font-family: var(--mono); font-size: 12px; color: var(--ink-3); letter-spacing: .04em; }
  .hero-stack strong { color: var(--ink); font-weight: 500; }
  .hero-cta-row { display: flex; gap: 16px; align-items: center; }
  .cta {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px;
    border: 1px solid var(--ink); background: var(--ink); color: var(--bg);
    font-family: var(--mono); font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
    border-radius: 999px; cursor: none; transition: all .25s;
    position: relative; overflow: hidden;
  }
  .cta:hover { transform: translateY(-2px); box-shadow: 0 12px 28px color-mix(in srgb, var(--ink) 35%, transparent); }
  .cta.ghost { background: transparent; color: var(--ink); }
  .cta.ghost:hover { background: var(--ink); color: var(--bg); }
  .cta svg { transition: transform .25s; }
  .cta:hover svg { transform: translateX(3px); }

  .scroll-hint { position: absolute; bottom: 32px; right: 60px; font-family: var(--mono); font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--ink-3); display: flex; align-items: center; gap: 10px; writing-mode: vertical-rl; transform: rotate(180deg); }
  .scroll-hint .line { width: 1px; height: 40px; background: var(--ink-3); animation: scroll-line 2s infinite; }
  @keyframes scroll-line { 0%,100% { transform: scaleY(.3); transform-origin: top; } 50% { transform: scaleY(1); } }

  /* Section base */
  section.s { padding: 140px 60px; position: relative; border-top: 1px solid var(--line); }
  .s-head { display: flex; align-items: baseline; gap: 24px; margin-bottom: 72px; }
  .s-num { font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: .1em; }
  .s-kicker { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--ink-3); }
  .s-title { font-family: var(--serif); font-size: clamp(56px, 7vw, 110px); font-weight: 400; line-height: .95; letter-spacing: -0.02em; margin-left: auto; }

  /* About */
  .about-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 80px; }
  .about-side { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--ink-3); }
  .about-body p { font-family: var(--serif); font-size: 32px; line-height: 1.3; margin-bottom: 28px; color: var(--ink); }
  .about-body p:not(:first-child) { font-family: var(--sans); font-size: 16px; line-height: 1.6; color: var(--ink-2); }
  .values { margin-top: 80px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; border-top: 1px solid var(--line); padding-top: 40px; }
  .value-k { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-3); margin-bottom: 6px; }
  .value-v { font-family: var(--serif); font-size: 22px; font-style: italic; line-height: 1.3; }

  /* Stack */
  .stack-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 1px solid var(--line); border-left: 1px solid var(--line); }
  .stack-card { padding: 32px 28px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); cursor: none; transition: background .3s; min-height: 320px; display: flex; flex-direction: column; position: relative; }
  .stack-card:hover { background: var(--bg-2); }
  .stack-card h3 { font-family: var(--serif); font-size: 30px; font-weight: 400; margin-bottom: 4px; line-height: 1; }
  .stack-card .sub { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-3); margin-bottom: 28px; }
  .stack-items { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .stack-pill { font-family: var(--mono); font-size: 13px; color: var(--ink-2); display: flex; align-items: center; gap: 10px; transition: all .25s; }
  .stack-pill::before { content: ""; width: 5px; height: 5px; background: var(--ink-3); border-radius: 50%; transition: all .25s; }
  .stack-card:hover .stack-pill { color: var(--ink); }
  .stack-card:hover .stack-pill::before { background: var(--ink); transform: scale(1.5); }
  .stack-num { position: absolute; top: 20px; right: 24px; font-family: var(--mono); font-size: 10px; color: var(--ink-3); }

  /* Marquee */
  .marquee { padding: 60px 0; overflow: hidden; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .marquee-track { display: flex; gap: 56px; white-space: nowrap; animation: marquee 50s linear infinite; font-family: var(--serif); font-style: italic; font-size: 64px; color: var(--ink-3); }
  .marquee-track span { display: inline-flex; align-items: center; gap: 56px; }
  .marquee-track span::after { content: "✦"; font-style: normal; font-size: 28px; color: var(--ink); }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Experience */
  .exp-item { display: grid; grid-template-columns: 200px 1fr 320px; gap: 60px; padding: 56px 0; border-top: 1px solid var(--line); cursor: none; transition: padding .35s ease, background .35s ease; position: relative; }
  .exp-item:last-child { border-bottom: 1px solid var(--line); }
  .exp-item:hover { padding-left: 24px; }
  .exp-item:hover::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--ink); }
  .exp-period { font-family: var(--mono); font-size: 12px; color: var(--ink-3); letter-spacing: .04em; }
  .exp-period .now { display: inline-block; padding: 2px 8px; background: var(--ink); color: var(--bg); border-radius: 999px; font-size: 10px; margin-top: 8px; }
  .exp-main h3 { font-family: var(--serif); font-size: 42px; font-weight: 400; line-height: 1; margin-bottom: 8px; }
  .exp-role { font-family: var(--sans); font-size: 15px; color: var(--ink-2); margin-bottom: 6px; }
  .exp-note { font-family: var(--serif); font-style: italic; font-size: 17px; color: var(--ink-3); margin-bottom: 24px; }
  .exp-bullets { display: flex; flex-direction: column; gap: 10px; max-width: 620px; }
  .exp-bullets li { list-style: none; font-size: 15px; line-height: 1.5; color: var(--ink-2); padding-left: 20px; position: relative; }
  .exp-bullets li::before { content: "—"; position: absolute; left: 0; color: var(--ink-3); }
  .exp-side { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
  .exp-side .tag { font-family: var(--mono); font-size: 11px; padding: 5px 11px; border: 1px solid var(--line-strong); border-radius: 999px; color: var(--ink-2); }

  /* Projects */
  .proj-list { border-top: 1px solid var(--line); }
  .proj-row { display: grid; grid-template-columns: 60px 1fr 1fr 200px; gap: 32px; align-items: center; padding: 32px 0; border-bottom: 1px solid var(--line); cursor: none; transition: padding .3s; position: relative; }
  .proj-row:hover { padding-left: 20px; padding-right: 20px; }
  .proj-row:hover .proj-name { font-style: italic; }
  .proj-num { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }
  .proj-name { font-family: var(--serif); font-size: 38px; font-weight: 400; line-height: 1; transition: font-style .3s; }
  .proj-role { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-3); }
  .proj-desc { font-size: 14px; line-height: 1.5; color: var(--ink-2); max-width: 380px; }
  .proj-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
  .proj-tag { font-family: var(--mono); font-size: 10px; padding: 3px 9px; border-radius: 999px; background: var(--bg-2); color: var(--ink-2); }
  .proj-links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
  .proj-links a { font-family: var(--mono); font-size: 11px; color: var(--ink-2); transition: color .15s; }
  .proj-links a:hover { color: var(--ink); }
  .proj-badge { display: inline-block; margin-top: 6px; font-family: var(--mono); font-size: 10px; padding: 2px 7px; background: var(--ink); color: var(--bg); border-radius: 999px; text-transform: uppercase; letter-spacing: .06em; }

  /* Education */
  .edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
  .edu-card { padding-top: 28px; border-top: 1px solid var(--line-strong); }
  .edu-school { font-family: var(--serif); font-size: 28px; line-height: 1.2; margin-bottom: 10px; }
  .edu-degree { font-size: 15px; color: var(--ink-2); margin-bottom: 6px; }
  .edu-period { font-family: var(--mono); font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .1em; }
  .edu-extras { display: flex; flex-direction: column; gap: 14px; }
  .edu-extras li { list-style: none; font-size: 15px; line-height: 1.5; color: var(--ink-2); padding-left: 24px; position: relative; }
  .edu-extras li::before { content: "+"; position: absolute; left: 0; font-family: var(--mono); color: var(--ink-3); }

  /* Contact */
  .contact { padding: 180px 60px 100px; text-align: left; border-top: 1px solid var(--line); }
  .contact-title { font-family: var(--serif); font-size: clamp(72px, 10vw, 160px); line-height: .92; letter-spacing: -0.03em; margin-bottom: 80px; max-width: 1400px; }
  .contact-title em { color: var(--ink-3); }
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: end; }
  .contact-blurb { font-family: var(--serif); font-style: italic; font-size: 22px; line-height: 1.4; color: var(--ink-2); max-width: 500px; }
  .channels { display: flex; flex-direction: column; }
  .channel { display: grid; grid-template-columns: 140px 1fr auto; gap: 20px; align-items: center; padding: 22px 0; border-top: 1px solid var(--line); cursor: none; transition: padding .25s; }
  .channel:last-child { border-bottom: 1px solid var(--line); }
  .channel:hover { padding-left: 16px; }
  .channel-label { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-3); }
  .channel-value { font-family: var(--serif); font-size: 26px; }
  .channel-action { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .1em; }
  .channel-action.copied { color: #4caf50; }

  /* Footer */
  .foot { padding: 40px 60px; display: flex; justify-content: space-between; border-top: 1px solid var(--line); font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: .04em; }
  .foot a { color: var(--ink-2); }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(40px); transition: opacity .9s cubic-bezier(.2,.7,.3,1), transform .9s cubic-bezier(.2,.7,.3,1); }
  .reveal.in { opacity: 1; transform: none; }

  /* Hover word */
  .hover-word { display: inline-block; transition: transform .4s cubic-bezier(.2,.7,.3,1); }

  @media (max-width: 900px) {
    .hero { padding: 120px 24px 60px; }
    .hero-sub, .about-grid, .edu-grid, .contact-grid { grid-template-columns: 1fr; gap: 40px; }
    .stack-grid { grid-template-columns: 1fr 1fr; }
    .exp-item { grid-template-columns: 1fr; gap: 24px; }
    .proj-row { grid-template-columns: 30px 1fr; gap: 14px; }
    .proj-row > *:nth-child(n+3) { grid-column: 2; }
    section.s, .contact, .foot, .topbar { padding-left: 24px; padding-right: 24px; }
    .topbar { padding-top: 14px; padding-bottom: 14px; }
    body { cursor: auto; }
    .cursor-dot, .cursor-ring { display: none; }
  }
</style>
</head>
<body data-theme="light">
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="cursor-dot" id="cursorDot"></div>
  <div id="root"></div>

  <script type="module" src="./main.tsx"></script>
</body>
</html>
