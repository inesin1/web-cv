<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Artyom Nesin — Contacts</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Artyom Nesin — contact channels: email, Telegram, GitHub, LinkedIn.">
<meta property="og:type" content="website">
<meta property="og:title" content="Artyom Nesin — Contacts">
<meta property="og:description" content="Email, Telegram, GitHub, LinkedIn.">
<meta property="og:image" content="/photo.jpeg">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; }
  .page { max-width: 720px; margin: 0 auto; padding: 0 32px; width: 100%; flex: 1; display: flex; flex-direction: column; }
  .nav-inner { max-width: 720px; margin: 0 auto; }
  .nav-spacer { flex: 1; }
  .logo { transition: opacity .15s; }
  .logo:hover { opacity: .75; }

  .hero { padding: 96px 0 56px; }
  .hero-name {
    font-size: clamp(40px, 7vw, 64px);
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.05;
    margin-bottom: 18px;
  }
  .hero-role {
    font-size: 18px;
    color: var(--ink-2);
    line-height: 1.5;
    max-width: 560px;
  }

  .channels-section { padding: 0 0 72px; }
  .channels { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .channel { padding: 18px 22px; }
  .channel:hover { transform: translateY(-1px); }
  .channel-ic { width: 40px; height: 40px; }
  .channel-label { margin-bottom: 3px; }
  .channel-value { font-size: 15px; }

  footer {
    padding: 28px 0 36px;
    margin-top: auto;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-3);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
    border-top: 1px solid var(--line);
  }
  footer .l { color: var(--ink-2); }
  .back-link { color: var(--ink-2); transition: color .15s; }
  .back-link:hover { color: var(--ink); }

  @media (max-width: 720px) {
    .page, .nav-inner { padding-left: 20px; padding-right: 20px; }
    .hero { padding: 56px 0 36px; }
  }
</style>
</head>
<body data-theme="dark">
  <div id="root"></div>
  <script type="module" src="/src/contacts.tsx"></script>
</body>
</html>
