<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Artyom Nesin — Contacts</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Artyom Nesin — contact channels: email, Telegram, GitHub, LinkedIn.">
<meta property="og:type" content="website">
<meta property="og:title" content="Artyom Nesin — Contacts">
<meta property="og:description" content="Email, Telegram, GitHub, LinkedIn.">
<meta property="og:image" content="/photo.jpeg">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1110;
    --bg-2: #15191a;
    --panel: #1a1f20;
    --line: rgba(220,228,235,.09);
    --line-strong: rgba(220,228,235,.18);
    --ink: #e6ece8;
    --ink-2: #9aa49c;
    --ink-3: #5e6964;
    --accent: #7ec699;
    --accent-soft: color-mix(in srgb, var(--accent) 14%, transparent);
    --sans: 'Geist', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }
  [data-theme="light"] {
    --bg: #f6f5f1;
    --bg-2: #ecebe5;
    --panel: #ffffff;
    --line: rgba(15,17,16,.10);
    --line-strong: rgba(15,17,16,.20);
    --ink: #14181a;
    --ink-2: #51585b;
    --ink-3: #8b9290;
    --accent: #2c7a44;
    --accent-soft: color-mix(in srgb, var(--accent) 10%, transparent);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background-color .3s, color .3s;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: var(--bg); }

  .page { max-width: 720px; margin: 0 auto; padding: 0 32px; width: 100%; flex: 1; display: flex; flex-direction: column; }

  .nav {
    position: sticky; top: 0; z-index: 30;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: saturate(1.4) blur(14px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    max-width: 720px; margin: 0 auto;
    display: flex; align-items: center; gap: 8px;
    padding: 14px 32px;
  }
  .nav-spacer { flex: 1; }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 12px;
    color: var(--ink-2); letter-spacing: .06em;
    transition: opacity .15s;
  }
  .logo:hover { opacity: .75; }
  .logo .mono {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--ink); color: var(--bg);
    font-weight: 600; font-size: 12px;
  }
  .logo strong { color: var(--ink); font-weight: 500; }

  .ctrls { display: flex; gap: 8px; align-items: center; }
  .seg { display: inline-flex; border: 1px solid var(--line-strong); border-radius: 999px; overflow: hidden; padding: 2px; gap: 1px; }
  .seg button {
    appearance: none; border: 0; background: transparent;
    padding: 5px 10px;
    font-family: var(--mono); font-size: 11px; letter-spacing: .04em;
    color: var(--ink-3); cursor: pointer; border-radius: 999px;
    transition: all .18s;
    display: inline-flex; align-items: center; justify-content: center;
    min-height: 24px;
  }
  .seg button.on { background: var(--ink); color: var(--bg); }
  .seg button:hover:not(.on) { color: var(--ink); }

  .hero { padding: 96px 0 56px; }
  .sec-label {
    display: inline-block;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-3); letter-spacing: .14em; text-transform: uppercase;
    margin-bottom: 18px;
  }
  .sec-label::before { content: "— "; color: var(--ink-3); }
  .hero-name {
    font-size: clamp(40px, 7vw, 64px);
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.05;
    margin-bottom: 18px;
  }
  .hero-role {
    font-size: 18px;
    color: var(--ink-2);
    line-height: 1.5;
    max-width: 560px;
  }

  .channels-section { padding: 0 0 72px; }
  .channels { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .channel {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 22px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    transition: all .2s;
    cursor: pointer;
  }
  .channel:hover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 5%, var(--panel)); transform: translateY(-1px); }
  .channel-ic {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-2);
    border-radius: 8px;
    font-size: 16px;
    color: var(--ink-2);
    flex-shrink: 0;
    transition: all .2s;
    font-family: var(--mono);
    font-weight: 600;
  }
  .channel:hover .channel-ic { background: var(--accent); color: var(--bg); }
  .channel-body { flex: 1; min-width: 0; }
  .channel-label { font-family: var(--mono); font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 3px; }
  .channel-value { font-size: 15px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .channel-action { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .1em; }
  .channel-action.ok { color: var(--accent); }

  footer {
    padding: 28px 0 36px;
    margin-top: auto;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-3);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
    border-top: 1px solid var(--line);
  }
  footer .l { color: var(--ink-2); }
  .back-link { color: var(--ink-2); transition: color .15s; }
  .back-link:hover { color: var(--ink); }

  @media (max-width: 720px) {
    .page, .nav-inner { padding-left: 20px; padding-right: 20px; }
    .hero { padding: 56px 0 36px; }
  }
</style>
</head>
<body data-theme="dark">
  <div id="root"></div>
  <script type="module" src="/src/contacts.tsx"></script>
</body>
</html>
