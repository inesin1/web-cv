<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Artyom Nesin — Backend-focused Fullstack</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Artyom Nesin — Backend-focused Fullstack Developer. TypeScript, Node.js, NestJS, Vue.js. 5 years of commercial experience. Open to new projects.">
<meta property="og:type" content="website">
<meta property="og:title" content="Artyom Nesin — Backend-focused Fullstack Developer">
<meta property="og:description" content="TypeScript · Node.js · NestJS · Vue.js. 5 years of commercial experience. Designing APIs, building integrations, shaping system architecture.">
<meta property="og:image" content="/photo.jpeg">
<meta property="og:image:width" content="800">
<meta property="og:image:height" content="800">
<meta property="og:locale" content="en_US">
<meta property="og:locale:alternate" content="ru_RU">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Artyom Nesin — Backend-focused Fullstack Developer">
<meta name="twitter:description" content="TypeScript · Node.js · NestJS · Vue.js · 5 yrs commercial">
<meta name="twitter:image" content="/photo.jpeg">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1110;
    --bg-2: #15191a;
    --panel: #1a1f20;
    --line: rgba(220,228,235,.09);
    --line-strong: rgba(220,228,235,.18);
    --ink: #e6ece8;
    --ink-2: #9aa49c;
    --ink-3: #5e6964;
    --accent: #7ec699;
    --accent-soft: color-mix(in srgb, var(--accent) 14%, transparent);
    --sans: 'Geist', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }
  [data-theme="light"] {
    --bg: #f6f5f1;
    --bg-2: #ecebe5;
    --panel: #ffffff;
    --line: rgba(15,17,16,.10);
    --line-strong: rgba(15,17,16,.20);
    --ink: #14181a;
    --ink-2: #51585b;
    --ink-3: #8b9290;
    --accent: #2c7a44;
    --accent-soft: color-mix(in srgb, var(--accent) 10%, transparent);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background-color .3s, color .3s;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: var(--bg); }

  /* Page wrap */
  .page { max-width: 880px; margin: 0 auto; padding: 0 32px; }

  /* Top nav */
  .nav {
    position: sticky; top: 0; z-index: 30;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: saturate(1.4) blur(14px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    max-width: 880px; margin: 0 auto;
    display: flex; align-items: center; gap: 8px;
    padding: 14px 32px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 12px;
    color: var(--ink-2); letter-spacing: .06em;
  }
  .logo .mono {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--ink); color: var(--bg);
    font-weight: 600; font-size: 12px;
    letter-spacing: 0;
  }
  .logo strong { color: var(--ink); font-weight: 500; }
  .nav-links { display: flex; gap: 2px; margin-left: 28px; flex: 1; flex-wrap: wrap; }
  .nav-link {
    padding: 6px 12px;
    font-size: 14px;
    color: var(--ink-3);
    border-radius: 999px;
    transition: all .18s;
    position: relative;
    white-space: nowrap;
  }
  .nav-link:hover { color: var(--ink); }
  .nav-link.on { color: var(--ink); }
  .nav-link.on::before {
    content: ""; position: absolute; left: 6px; right: 6px; bottom: -1px;
    height: 2px; background: var(--accent); border-radius: 2px;
  }
  .ctrls { display: flex; gap: 8px; align-items: center; }
  .seg { display: inline-flex; border: 1px solid var(--line-strong); border-radius: 999px; overflow: hidden; padding: 2px; gap: 1px; }
  .seg button {
    appearance: none; border: 0; background: transparent;
    padding: 5px 10px;
    font-family: var(--mono); font-size: 11px; letter-spacing: .04em;
    color: var(--ink-3); cursor: pointer; border-radius: 999px;
    transition: all .18s;
    display: inline-flex; align-items: center; justify-content: center;
    min-height: 24px;
  }
  .seg button.on { background: var(--ink); color: var(--bg); }
  .seg button:hover:not(.on) { color: var(--ink); }

  /* Hero */
  .hero { padding: 88px 0 72px; border-bottom: 1px solid var(--line); }
  .hero-current {
    display: inline-flex; align-items: center; gap: 10px;
    margin-top: 28px;
    padding: 9px 14px 9px 12px;
    background: var(--bg-2);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--ink-2);
    border: 1px solid var(--line);
  }
  .hero-current .nowbar {
    width: 2px; height: 14px; background: var(--accent); border-radius: 1px;
    flex-shrink: 0;
  }
  .hero-current .lbl {
    font-family: var(--mono); font-size: 10px; text-transform: uppercase;
    letter-spacing: .12em; color: var(--accent);
    margin-right: 4px;
  }
  .hero-status {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 12px;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 999px;
    font-family: var(--mono); font-size: 11px; letter-spacing: .04em;
    margin-bottom: 28px;
  }
  .hero-status .pulse {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 25%, transparent);
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 25%, transparent); } 50% { box-shadow: 0 0 0 9px color-mix(in srgb, var(--accent) 0%, transparent); } }

  .hero-name {
    font-size: clamp(40px, 7vw, 64px);
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.05;
    margin-bottom: 14px;
  }
  .hero-role {
    font-size: 19px;
    color: var(--ink-2);
    line-height: 1.45;
    max-width: 600px;
    margin-bottom: 28px;
  }
  .hero-role strong { color: var(--ink); font-weight: 500; }

  .hero-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 36px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 5px 11px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-2);
    background: var(--panel);
    white-space: nowrap;
  }
  .chip .label { color: var(--ink-3); text-transform: lowercase; letter-spacing: .04em; }
  .chip .val { color: var(--ink); }

  .hero-cta { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 18px;
    background: var(--ink); color: var(--bg);
    border: 1px solid var(--ink); border-radius: 8px;
    font: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all .2s;
    text-decoration: none; white-space: nowrap;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px color-mix(in srgb, var(--ink) 25%, transparent); }
  .btn.ghost { background: transparent; color: var(--ink); }
  .btn.ghost:hover { background: var(--bg-2); }
  .btn svg { width: 14px; height: 14px; }

  /* Section */
  section {
    padding: 72px 0;
    border-bottom: 1px solid var(--line);
    scroll-margin-top: 80px;
  }
  section:last-of-type { border-bottom: none; }
  .sec-label {
    display: inline-block;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-3); letter-spacing: .14em; text-transform: uppercase;
    margin-bottom: 18px;
  }
  .sec-label::before { content: "— "; color: var(--ink-3); }
  .sec-h {
    font-size: 32px; font-weight: 600; letter-spacing: -0.015em;
    margin-bottom: 36px;
    line-height: 1.15;
  }

  /* About */
  .about p {
    font-size: 17px; line-height: 1.6;
    color: var(--ink-2);
    margin-bottom: 18px;
    max-width: 680px;
  }
  .about p:first-of-type { color: var(--ink); font-size: 19px; }
  .about p strong { color: var(--ink); font-weight: 500; }

  /* Stack */
  .stack-groups {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
  }
  .stack-group {
    padding: 22px 24px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    transition: border-color .2s, transform .2s;
  }
  .stack-group:hover { border-color: var(--line-strong); }
  .stack-group h3 {
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    color: var(--accent); margin-bottom: 14px;
    letter-spacing: .04em;
  }
  .stack-items { display: flex; flex-wrap: wrap; gap: 6px; }
  .stack-tag {
    padding: 5px 11px;
    background: var(--bg-2);
    border-radius: 6px;
    font-family: var(--mono); font-size: 12px;
    color: var(--ink);
    transition: all .15s;
  }
  .stack-tag:hover { background: var(--ink); color: var(--bg); transform: translateY(-1px); }

  /* Experience timeline */
  .timeline { display: flex; flex-direction: column; gap: 8px; }
  .job {
    padding: 24px 26px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    transition: border-color .2s;
    position: relative;
  }
  .job:hover { border-color: var(--line-strong); }
  .job-head {
    display: flex; align-items: baseline; gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .job-company { font-size: 20px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; }
  .job-period {
    margin-left: auto;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-3); letter-spacing: .04em;
    white-space: nowrap;
  }
  .job-period .now {
    display: inline-block; margin-left: 6px;
    padding: 2px 7px; background: var(--accent); color: var(--bg);
    border-radius: 999px; font-size: 10px; font-weight: 600;
  }
  .job-role { font-size: 14px; color: var(--ink-2); margin-bottom: 4px; }
  .job-note { font-size: 13px; color: var(--ink-3); font-style: italic; margin-bottom: 16px; }
  .job-bullets { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .job-bullets li {
    list-style: none;
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.55;
    padding-left: 22px;
    position: relative;
  }
  .job-bullets li::before {
    content: ""; position: absolute;
    left: 6px; top: 9px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }
  .job-stack { display: flex; flex-wrap: wrap; gap: 5px; }
  .job-stack span {
    font-family: var(--mono); font-size: 11px;
    padding: 3px 9px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink-2);
  }

  /* Projects */
  .projects { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .proj {
    padding: 22px 24px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    transition: all .2s;
    cursor: default;
    display: flex; flex-direction: column;
    min-height: 200px;
  }
  .proj:hover { border-color: var(--line-strong); transform: translateY(-2px); }
  .proj-head { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .proj-name { font-size: 17px; font-weight: 600; color: var(--ink); flex: 1; letter-spacing: -0.005em; }
  .proj-role {
    font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: .1em;
    color: var(--accent);
    padding: 2px 8px;
    background: var(--accent-soft);
    border-radius: 999px;
    white-space: nowrap;
  }
  .proj-desc { font-size: 13px; color: var(--ink-2); line-height: 1.5; margin-bottom: 14px; flex: 1; }
  .proj-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .proj-tags { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
  .proj-tags span {
    font-family: var(--mono); font-size: 10px;
    padding: 2px 7px;
    background: var(--bg-2);
    border-radius: 4px;
    color: var(--ink-2);
  }
  .proj-badge {
    font-family: var(--mono); font-size: 10px;
    color: var(--accent);
    white-space: nowrap;
  }
  .proj-links {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
  }
  .proj-links a {
    font-family: var(--mono); font-size: 11px;
    color: var(--accent);
    transition: opacity .15s;
  }
  .proj-links a:hover { opacity: .7; text-decoration: underline; }

  /* Education */
  .edu {
    padding: 22px 24px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }
  .edu-school { font-size: 17px; font-weight: 600; color: var(--ink); margin-bottom: 4px; letter-spacing: -0.005em; }
  .edu-degree { font-size: 14px; color: var(--ink-2); margin-bottom: 4px; }
  .edu-period { font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: .04em; }
  .edu-extras { margin-top: 22px; display: flex; flex-direction: column; gap: 10px; }
  .edu-extras li {
    list-style: none;
    font-size: 14px; color: var(--ink-2);
    padding-left: 22px; position: relative; line-height: 1.5;
  }
  .edu-extras li::before {
    content: "+"; position: absolute; left: 4px;
    font-family: var(--mono); color: var(--accent);
  }

  /* Contact */
  .contact-head { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 20px; margin-bottom: 32px; }
  .contact-blurb { font-size: 18px; color: var(--ink-2); line-height: 1.5; max-width: 500px; }
  .channels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .channel {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    transition: all .2s;
    cursor: pointer;
  }
  .channel:hover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 5%, var(--panel)); }
  .channel-ic {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-2);
    border-radius: 8px;
    font-size: 16px;
    color: var(--ink-2);
    flex-shrink: 0;
    transition: all .2s;
  }
  .channel:hover .channel-ic { background: var(--accent); color: var(--bg); }
  .channel-body { flex: 1; min-width: 0; }
  .channel-label { font-family: var(--mono); font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 2px; }
  .channel-value { font-size: 14px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .channel-action { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .1em; }
  .channel-action.ok { color: var(--accent); }

  /* Footer */
  footer {
    padding: 36px 0 48px;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-3);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
    border-top: 1px solid var(--line);
  }
  footer .l { color: var(--ink-2); }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity .7s cubic-bezier(.2,.7,.3,1), transform .7s cubic-bezier(.2,.7,.3,1); }
  .reveal.in { opacity: 1; transform: none; }

  /* Back to top */
  .back-top {
    position: fixed; bottom: 28px; right: 28px;
    width: 42px; height: 42px;
    background: var(--panel); color: var(--ink-2);
    border: 1px solid var(--line-strong); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 20;
    opacity: 0; transform: translateY(10px) scale(.9); pointer-events: none;
    transition: all .25s cubic-bezier(.2,.7,.3,1);
    font-size: 14px;
    backdrop-filter: blur(8px);
  }
  .back-top.show { opacity: 1; transform: none; pointer-events: auto; }
  .back-top:hover { color: var(--ink); border-color: var(--ink-3); transform: translateY(-2px); }

  @media (max-width: 720px) {
    .page, .nav-inner { padding-left: 20px; padding-right: 20px; }
    .nav-links { display: none; }
    .hero { padding: 56px 0 48px; }
    section { padding: 56px 0; }
    .projects, .channels { grid-template-columns: 1fr; }
    .job-period { margin-left: 0; }
    .contact-head { flex-direction: column; align-items: flex-start; }
  }

  /* Print */
  @media print {
    @page { size: A4; margin: 14mm 14mm 16mm; }
    :root {
      --bg: #ffffff;
      --bg-2: #f4f4f1;
      --panel: #ffffff;
      --line: rgba(0,0,0,.10);
      --line-strong: rgba(0,0,0,.25);
      --ink: #111;
      --ink-2: #444;
      --ink-3: #777;
      --accent: #1e6a36;
      --accent-soft: rgba(30,106,54,.10);
    }
    html, body { background: #fff !important; color: #111 !important; font-size: 11px; line-height: 1.45; }
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .nav, .back-top { display: none !important; }
    .page { max-width: 100%; padding: 0; }
    .hero { padding: 0 0 16px; border-bottom: 1px solid var(--line); page-break-after: avoid; }
    .hero-status { display: none; }
    .hero-name { font-size: 28px; margin-bottom: 6px; }
    .hero-role { font-size: 13px; max-width: none; margin-bottom: 12px; }
    .hero-chips { gap: 4px; margin-bottom: 12px; }
    .chip { padding: 2px 8px; font-size: 9px; background: transparent; }
    .hero-cta { display: none; }
    .hero-current { font-size: 11px; padding: 6px 10px; margin-top: 14px; background: transparent; }
    section { padding: 14px 0; page-break-inside: avoid; border-bottom: 1px solid var(--line); }
    .sec-label { font-size: 9px; margin-bottom: 6px; }
    .sec-h { font-size: 16px; margin-bottom: 12px; }
    .about p { font-size: 11px; margin-bottom: 6px; max-width: none; }
    .about p:first-of-type { font-size: 12px; }
    .stack-groups { gap: 6px; }
    .stack-group { padding: 8px 10px; background: transparent; border-radius: 4px; }
    .stack-group h3 { font-size: 10px; margin-bottom: 6px; }
    .stack-tag { padding: 1px 6px; font-size: 9px; background: transparent; border: 1px solid var(--line); }
    .job, .proj, .edu { padding: 10px 12px; page-break-inside: avoid; border-radius: 4px; background: transparent; }
    .job + .job { margin-top: 4px; }
    .job-company { font-size: 13px; }
    .job-period { font-size: 9px; }
    .job-role { font-size: 11px; }
    .job-note { font-size: 10px; margin-bottom: 6px; }
    .job-bullets li { font-size: 10.5px; padding-left: 14px; line-height: 1.4; }
    .job-bullets li::before { width: 3px; height: 3px; top: 7px; left: 4px; }
    .job-stack span { font-size: 9px; padding: 1px 6px; }
    .projects { grid-template-columns: 1fr 1fr; gap: 6px; }
    .proj { min-height: auto; }
    .proj-name { font-size: 12px; }
    .proj-desc { font-size: 10px; margin-bottom: 6px; }
    .proj-tags span { font-size: 9px; padding: 1px 5px; }
    .channels { grid-template-columns: 1fr 1fr; gap: 6px; }
    .channel { padding: 8px 10px; }
    .channel-ic { width: 24px; height: 24px; font-size: 12px; }
    .channel-value { font-size: 11px; }
    .channel-action { display: none; }
    .reveal { opacity: 1 !important; transform: none !important; }
    footer { padding: 12px 0; font-size: 9px; }
    a { color: inherit; text-decoration: none; }
  }
</style>
</head>
<body data-theme="dark">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
